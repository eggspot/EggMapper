name: Publish NuGet

# Every push to main produces a STABLE NuGet release.
#
# Versioning strategy
# ───────────────────
# • Push to main → reads <Version> from EggMapper.csproj → stable package
#                  → automatically creates and pushes git tag  v<version>
#                  → if the tag already exists the job is a no-op (same
#                    version committed twice without bumping csproj)
# • workflow_dispatch → optional explicit version override (stable)
#
# Required secret: NUGET_API_KEY  (repository → Settings → Secrets)
#
# To release a new version:
#   1. Update <Version> in src/EggMapper/EggMapper.csproj  (and DI csproj)
#   2. Push / merge to main
#   → workflow publishes the stable package and tags the commit automatically

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit package version (e.g. 1.2.3). Overrides the version in EggMapper.csproj.'
        required: false

permissions:
  contents: write   # needed to create and push git tags

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so tag existence checks work

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Determine the stable version to publish ────────────────────────────
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Read the version declared in the project file — always stable
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/EggMapper/EggMapper.csproj)
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      # ── Skip if this version was already published (tag exists) ───────────
      - name: Check for existing tag
        id: tag_check
        shell: bash
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if git rev-parse --verify "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "Tag ${TAG} already exists — version unchanged, skipping publish."
            echo "ALREADY_TAGGED=true"  >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} does not exist — will publish."
            echo "ALREADY_TAGGED=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & test ───────────────────────────────────────────────────────
      - name: Restore dependencies
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: dotnet restore

      - name: Build (Release)
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: dotnet test --configuration Release --no-build --verbosity minimal

      # ── Pack ───────────────────────────────────────────────────────────────
      - name: Pack EggMapper
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: |
          dotnet pack src/EggMapper/EggMapper.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./artifacts

      - name: Pack EggMapper.DependencyInjection
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: |
          dotnet pack src/EggMapper.DependencyInjection/EggMapper.DependencyInjection.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./artifacts

      # ── Inspect packages ──────────────────────────────────────────────────
      - name: List packages
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: ls -lh ./artifacts/

      # ── Upload as CI artifact (always, for traceability) ──────────────────
      - name: Upload packages as artifact
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      # ── Push to NuGet.org ─────────────────────────────────────────────────
      - name: Push to NuGet.org
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${NUGET_API_KEY}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          # Push symbol packages if any were produced
          if ls ./artifacts/*.snupkg 1>/dev/null 2>&1; then
            dotnet nuget push ./artifacts/*.snupkg \
              --api-key "${NUGET_API_KEY}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          fi

      # ── Auto-tag the commit ────────────────────────────────────────────────
      - name: Create and push git tag
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "✅ Created and pushed tag ${TAG}"

