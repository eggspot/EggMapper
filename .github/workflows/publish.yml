name: Publish NuGet

# Fully automatic versioning — every push to main auto-determines the version
# bump type from commit messages (conventional commits) and publishes.
#
# Versioning strategy (zero manual steps)
# ───────────────────────────────────────
# Commit message prefix → version bump:
#   feat:  / feat!:       → minor bump (1.0.0 → 1.1.0)
#   fix:  / perf: / chore: → patch bump (1.0.0 → 1.0.1)
#   BREAKING CHANGE / !:  → major bump (1.0.0 → 2.0.0)
#   (no prefix match)     → patch bump (default)
#
# Flow:
#   Push to main → detect bump type from commits since last tag
#     → build → test → pack → publish to NuGet
#     → create git tag + GitHub Release
#
# Version is always derived from the last git tag (not csproj).
# No commits are pushed back to main — works with branch protection.
#
# Required secret: NUGET_API_KEY

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      force_bump:
        description: 'Force a specific bump type (overrides commit detection)'
        required: false
        default: 'auto'
        type: choice
        options: [auto, patch, minor, major]

permissions:
  contents: write

# Serialize publish runs — prevents tag/release race conditions when
# multiple PRs merge to main in quick succession.
concurrency:
  group: publish-nuget
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Path filter (src/**) is the primary guard against README-only/docs pushes.
    # Actor guard is a secondary safety net.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # ── Determine version from git tags + commit analysis ───────────────
      - name: Determine version
        id: version
        shell: bash
        run: |
          # Current version comes from the last git tag (source of truth)
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          CURRENT="${LAST_TAG#v}"
          echo "Current version (from tag): ${CURRENT}"

          # Manual override from workflow_dispatch
          FORCE="${{ github.event.inputs.force_bump }}"
          if [[ -n "$FORCE" && "$FORCE" != "auto" ]]; then
            BUMP="${FORCE}"
            echo "Forced bump type: ${BUMP}"
          else
            # Analyze commit messages since last tag
            if [[ "$LAST_TAG" == "v0.0.0" ]]; then
              COMMIT_RANGE="HEAD"
              echo "No previous tag found — analyzing all commits"
            else
              COMMIT_RANGE="${LAST_TAG}..HEAD"
              echo "Analyzing commits since ${LAST_TAG}"
            fi

            BUMP="patch"
            COMMITS=$(git log --pretty=format:"%s" ${COMMIT_RANGE} 2>/dev/null || git log --pretty=format:"%s" HEAD~10..HEAD)

            echo "Commits to analyze:"
            echo "$COMMITS"

            if echo "$COMMITS" | grep -qiE "^.*!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
              BUMP="minor"
            fi

            echo "Detected bump type: ${BUMP}"
          fi

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"
          case "$BUMP" in
            major) VERSION="$((MAJOR + 1)).0.0" ;;
            minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${CURRENT} → ${VERSION} (${BUMP} bump)"

      # ── Check if already published ───────────────────────────────────────
      - name: Check for existing tag
        id: tag_check
        shell: bash
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          # Check both local and remote tags to catch races
          if git rev-parse --verify "refs/tags/${TAG}" > /dev/null 2>&1 \
             || git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping."
            echo "ALREADY_TAGGED=true" >> "$GITHUB_OUTPUT"
          else
            echo "ALREADY_TAGGED=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & test ─────────────────────────────────────────────────────
      - name: Restore
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: dotnet restore

      - name: Build
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: dotnet test --configuration Release --no-build --verbosity minimal

      # ── Pack ─────────────────────────────────────────────────────────────
      - name: Pack
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: |
          dotnet pack src/EggMapper/EggMapper.csproj \
            --configuration Release --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./artifacts

      - name: Upload artifacts
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      # ── Publish to NuGet ─────────────────────────────────────────────────
      - name: Push to NuGet.org
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${NUGET_API_KEY}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          if ls ./artifacts/*.snupkg 1>/dev/null 2>&1; then
            dotnet nuget push ./artifacts/*.snupkg \
              --api-key "${NUGET_API_KEY}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          fi

      # ── Tag + Release ────────────────────────────────────────────────────
      - name: Create git tag
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          # Idempotent push — if another run already created this tag, continue gracefully
          if ! git push origin "${TAG}" 2>&1; then
            echo "::warning::Tag ${TAG} was already pushed (likely by a concurrent run). Continuing."
            # Fetch the remote tag so the release step can reference it
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
          fi

      - name: Create GitHub Release
        if: steps.tag_check.outputs.ALREADY_TAGGED == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          # Idempotent — skip if release already exists (e.g., from a concurrent run)
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "::warning::Release ${TAG} already exists. Skipping."
          else
            gh release create "${TAG}" \
              --title "EggMapper ${TAG}" \
              --generate-notes \
              ./artifacts/*.nupkg ./artifacts/*.snupkg
          fi
