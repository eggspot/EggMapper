name: Benchmarks

on:
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x', '10.0.x']

    steps:
      - uses: actions/checkout@v4

      # Install all required SDKs so every TFM (including net10.0) can be compiled
      # regardless of which runtime version the matrix is currently testing.
      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build src/EggMapper.Benchmarks/EggMapper.Benchmarks.csproj --configuration Release --no-restore

      - name: Run Benchmarks
        run: |
          # Derive the TFM label from the matrix version (e.g. "8.0.x" -> "net8.0")
          MAJOR=$(echo "${{ matrix.dotnet-version }}" | cut -d. -f1)
          TFM="net${MAJOR}.0"
          cd src/EggMapper.Benchmarks
          dotnet run --configuration Release --framework "${TFM}" -- --filter * --exporters json

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-dotnet-${{ matrix.dotnet-version }}
          path: src/EggMapper.Benchmarks/BenchmarkDotNet.Artifacts/
