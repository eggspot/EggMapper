name: Benchmarks

# Runs the benchmark suite on .NET 10 only and:
#   • On pull_request  → posts a detailed sticky comment on the PR
#   • On push to main  → uploads artifacts (no push-back to main)
#   • workflow_dispatch → full manual run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # needed to create benchmark-update branches
  pull-requests: write   # needed to post PR comments

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build benchmarks (Release)
        run: dotnet build src/EggMapper.Benchmarks/EggMapper.Benchmarks.csproj --configuration Release --no-restore

      # ── Run benchmarks on .NET 10 ─────────────────────────────────────
      # PRs use --job Short for fast feedback (~5 min).
      # Push to main and workflow_dispatch run full benchmarks.
      - name: Run benchmarks
        run: |
          cd src/EggMapper.Benchmarks
          dotnet run --configuration Release --framework net10.0 -- \
            --filter '*' \
            ${{ github.event_name == 'pull_request' && '--job Short' || '' }} \
            --exporters markdown json

      # ── Generate the combined report ───────────────────────────────────
      - name: Generate detailed benchmark report
        id: report
        run: |
          python3 scripts/parse-benchmarks.py \
            src/EggMapper.Benchmarks/BenchmarkDotNet.Artifacts \
            benchmark-report.md

      # ── Upload artifacts ───────────────────────────────────────────────
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-net10-${{ github.run_number }}
          path: |
            src/EggMapper.Benchmarks/BenchmarkDotNet.Artifacts/
            benchmark-report.md

      # ── Update README on push to main ──────────────────────────────────
      # Creates a PR with updated benchmark tables (can't push to protected main).
      - name: Update README with benchmark results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/update-readme-benchmarks.py \
            src/EggMapper.Benchmarks/BenchmarkDotNet.Artifacts \
            README.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi

          BRANCH="chore/update-benchmarks-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "${BRANCH}"
          git commit -m "chore: update benchmark results in README [skip ci]"
          git push origin "${BRANCH}"

          # Create PR (auto-merge will handle it)
          gh pr create \
            --title "chore: update benchmark results in README" \
            --body "Automated benchmark update from CI run #${{ github.run_number }}." \
            --head "${BRANCH}" \
            --base main

      # ── Post detailed comment on PRs ───────────────────────────────────
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = fs.readFileSync('benchmark-report.md', 'utf8');

            // GitHub PR comments are capped at 65,536 bytes.
            const MAX = 65000;
            if (Buffer.byteLength(report, 'utf8') > MAX) {
              const truncNote = '\n\n> ⚠️ Report truncated — download the full artifact for all details.';
              while (Buffer.byteLength(report + truncNote, 'utf8') > MAX) {
                report = report.slice(0, report.lastIndexOf('\n'));
              }
              report += truncNote;
            }

            const HEADER_MARKER = '<!-- benchmark-results -->';
            const body = HEADER_MARKER + '\n' + report;

            // Update existing bot comment if present, otherwise create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes(HEADER_MARKER)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing benchmark comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new benchmark comment.');
            }
