name: Update Wiki

# Syncs every file in docs/ to the GitHub Wiki whenever the docs change on main.
#
# ⚠️  Prerequisites
# ─────────────────
# 1. The wiki must be initialised at least once manually:
#    GitHub repo → Wiki tab → "Create the first page" → save anything.
# 2. The default GITHUB_TOKEN has write access to the wiki for the same repo,
#    so no additional secrets are required.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" \
            wiki-repo

      - name: Copy docs to wiki
        run: |
          # Copy all markdown files from docs/ into the wiki root.
          # The wiki page title equals the filename (without .md), so name files
          # accordingly (e.g. Getting-Started.md → "Getting Started" page).
          cp -f docs/*.md wiki-repo/

          # Ensure the wiki Home page exists (use Home.md if present in docs/).
          if [ ! -f wiki-repo/Home.md ]; then
            cp docs/Home.md wiki-repo/Home.md 2>/dev/null || true
          fi

      - name: Commit and push wiki changes
        working-directory: wiki-repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet \
            && echo "Wiki already up-to-date — nothing to commit." \
            || git commit -m "docs: sync from repository docs/ [skip ci]"
          git push
